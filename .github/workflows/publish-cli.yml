name: Publish CLI to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: openusage-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: openusage-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: openusage-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: openusage-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libclang-dev clang
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Install build dependencies (Linux x64)
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang pkg-config libssl-dev

      - name: Build CLI binary
        run: cargo build -p openusage-cli --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/openusage

  release:
    name: Create GitHub Release & Publish npm
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Download all platform binaries
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Create GitHub Release with binaries
      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION}"

          # Rename artifacts for release
          mkdir -p release-assets
          for name in openusage-linux-x64 openusage-linux-arm64 openusage-darwin-x64 openusage-darwin-arm64; do
            cp "artifacts/${name}/openusage" "release-assets/${name}"
            chmod +x "release-assets/${name}"
          done

          # Create release (or update if tag exists)
          gh release create "$TAG" \
            --title "v${VERSION}" \
            --generate-notes \
            release-assets/* \
            || gh release upload "$TAG" release-assets/* --clobber

      # Bundle plugins
      - name: Bundle plugins
        run: |
          mkdir -p npm/openusage/plugins
          for plugin_dir in plugins/*/; do
            plugin_name="$(basename "$plugin_dir")"
            if [ "$plugin_name" = "mock" ]; then continue; fi
            cp -r "$plugin_dir" "npm/openusage/plugins/$plugin_name"
          done

      # Set version
      - name: Set version
        run: |
          VERSION="${{ inputs.version }}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' npm/openusage/package.json > "$tmp" && mv "$tmp" npm/openusage/package.json

      # Publish npm package
      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/openusage
          npm publish --access public

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "DRY RUN — would have published:"
          echo "  GitHub Release: v${{ inputs.version }} with 4 platform binaries"
          echo "  npm: @mwz-code/openusage@${{ inputs.version }}"
          echo ""
          echo "Artifacts:"
          ls -la artifacts/*/
